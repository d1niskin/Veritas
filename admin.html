<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veritas | Система обработки обращений</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #d1d5db; }
    </style>
</head>
<body class="bg-[#f4f4f5] text-gray-900 antialiased min-h-screen">

    <div id="login-screen" class="flex items-center justify-center min-h-screen bg-[#f4f4f5]">
        <div class="bg-white border border-gray-200 p-10 rounded-[24px] shadow-[0_8px_30px_rgb(0,0,0,0.04)] w-96 text-center">
            <h2 class="text-[32px] font-bold mb-1 text-black tracking-tight">Veritas</h2>
            <p class="text-[15px] text-gray-500 mb-8 font-medium">Вход для сотрудников</p>
            <input type="password" id="admin-password" placeholder="Пароль доступа" class="w-full bg-white border border-gray-200 p-4 rounded-2xl mb-6 focus:border-black outline-none transition-colors font-medium text-center tracking-wider text-[15px]">
            <button onclick="login()" class="w-full bg-[#ffdd2b] text-black font-semibold py-4 rounded-2xl hover:bg-[#f5d321] transition duration-200 text-[16px]">Войти</button>
            <p id="login-error" class="text-red-500 text-[14px] mt-4 hidden font-medium">Доступ запрещен</p>
        </div>
    </div>

    <div id="dashboard-screen" class="hidden flex flex-col min-h-screen">
        <header class="bg-white border-b border-gray-200 p-6 flex justify-between items-center sticky top-0 z-50">
            <div class="flex items-center gap-4">
                <div class="w-2.5 h-2.5 bg-[#ffdd2b] rounded-full animate-pulse"></div>
                <h1 class="text-[20px] font-bold tracking-tight text-black">Veritas <span class="text-gray-400 font-medium ml-2 text-[15px]">| Система обработки обращений</span></h1>
            </div>
            <button onclick="logout()" class="text-[14px] font-semibold bg-gray-100 px-5 py-2.5 rounded-xl hover:bg-gray-200 text-black transition-colors">Выйти</button>
        </header>

        <main class="p-8 max-w-[1400px] mx-auto w-full flex-grow">
            <div class="bg-white border border-gray-200 rounded-[24px] overflow-hidden shadow-[0_8px_30px_rgb(0,0,0,0.04)]">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50 text-gray-500 text-[13px] font-semibold">
                            <th class="p-5 border-b border-gray-200 w-[15%]">ID обращения</th>
                            <th class="p-5 border-b border-gray-200 w-[15%]">Категория</th>
                            <th class="p-5 border-b border-gray-200 w-[40%]">Обращения</th>
                            <th class="p-5 border-b border-gray-200 w-[12%]">Статус</th>
                            <th class="p-5 border-b border-gray-200 w-[18%]">Изменение статуса</th>
                        </tr>
                    </thead>
                    <tbody id="tickets-table" class="text-[14px]">
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        const API_URL = "/api";
        let currentKey = "";

        // ЗАЩИТА ОТ XSS АТАК
        function escapeHTML(str) {
            if (!str) return "";
            return str.replace(/[&<>'"]/g, tag => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
            }[tag] || tag));
        }

        async function login() {
            const pwd = document.getElementById('admin-password').value;
            try {
                const res = await fetch(`${API_URL}/admin/tickets`, { headers: { 'admin-key': pwd } });
                if (res.ok) {
                    currentKey = pwd;
                    document.getElementById('login-screen').classList.add('hidden');
                    document.getElementById('dashboard-screen').classList.remove('hidden');
                    loadTickets();
                } else { 
                    document.getElementById('login-error').classList.remove('hidden'); 
                }
            } catch (e) { alert("Сервер недоступен."); }
        }

        async function loadTickets() {
            let savedInputs = {};
            document.querySelectorAll('input[id^="reply-input-"]').forEach(input => {
                if (input.value) savedInputs[input.id] = input.value;
            });

            try {
                const res = await fetch(`${API_URL}/admin/tickets`, { headers: { 'admin-key': currentKey } });
                if (!res.ok) {
                    if(res.status === 403) logout();
                    return;
                }
                const tickets = await res.json();
                const tbody = document.getElementById('tickets-table');
                tbody.innerHTML = "";

                tickets.forEach(t => {
                    let statusColor = t.status === "Новое" ? "bg-red-50 text-red-600" : 
                                      t.status === "В работе" ? "bg-[#ffdd2b]/20 text-[#b28c00]" : 
                                      "bg-green-50 text-green-600";
                    
                    let mainFileHtml = t.file_url ? `<div class="mt-3"><a href="${t.file_url}" target="_blank" class="text-blue-600 hover:text-blue-800 underline underline-offset-2 text-[13px] font-medium">[Вложение обращения]</a></div>` : '';

                    let chatHtml = t.messages.map(m => {
                        let fileHtml = m.file_url ? `<br><a href="${m.file_url}" target="_blank" class="text-black underline underline-offset-2 text-[13px] mt-1 inline-block font-medium">[Прикрепленный файл]</a>` : '';
                        let delBtn = m.sender === 'Офицер' ? `<button onclick="deleteMsg(${m.id})" class="text-gray-400 hover:text-red-500 font-medium text-[12px] ml-3 transition-colors">[удалить]</button>` : '';
                        
                        let bubbleClass = m.sender === 'Офицер' ? 
                            'bg-gray-100 text-black ml-4 font-normal text-right' : 
                            'bg-[#ffdd2b] text-black mr-4 font-normal text-left';

                        return `
                        <div class="mb-2 text-[14px] p-3.5 rounded-2xl shadow-sm ${bubbleClass}">
                            <span class="text-[11px] font-semibold text-black/50 block mb-1">${m.sender}</span>
                            <span class="leading-relaxed whitespace-pre-wrap">${escapeHTML(m.text)}</span> ${fileHtml} ${delBtn}
                        </div>`;
                    }).join('');

                    if (t.messages.length === 0) chatHtml = '<div class="text-[13px] text-gray-400 font-medium text-center py-4">Переписка отсутствует</div>';

                    tbody.innerHTML += `
                        <tr class="hover:bg-gray-50/50 border-b border-gray-100 transition-colors">
                            <td class="p-5 align-top">
                                <strong class="text-black text-[15px]">${t.ticket_number}</strong>
                            </td>
                            <td class="p-5 align-top font-medium text-black">${t.category}</td>
                            <td class="p-5 align-top">
                                <div class="text-black mb-4 bg-white p-5 rounded-2xl border border-gray-200 shadow-sm">
                                    <b class="block mb-2 text-[13px] text-gray-500 font-medium">Текст обращения:</b> 
                                    <span class="leading-relaxed text-[15px] whitespace-pre-wrap">${escapeHTML(t.description)}</span>
                                    ${mainFileHtml}
                                </div>
                                
                                <div class="chat-container max-h-48 overflow-y-auto mb-3 pr-3 custom-scrollbar" id="chat-${t.ticket_number}">${chatHtml}</div>
                                
                                <div class="flex flex-col gap-3 border-t border-gray-100 pt-4 mt-2">
                                    <div class="flex items-center gap-3">
                                        <input type="file" id="reply-file-${t.ticket_number}" class="text-[13px] text-gray-500 file:mr-4 file:py-1.5 file:px-4 file:rounded-xl file:border-0 file:text-[13px] file:font-semibold file:bg-gray-100 file:text-black hover:file:bg-gray-200 transition-colors cursor-pointer w-full">
                                    </div>
                                    <div class="flex gap-2">
                                        <input type="text" id="reply-input-${t.ticket_number}" placeholder="Написать ответ..." class="bg-white border border-gray-200 rounded-2xl p-3 text-[14px] w-full outline-none focus:border-black text-black transition-colors">
                                        <button onclick="sendReply('${t.ticket_number}')" class="bg-black text-white px-6 py-2 rounded-2xl text-[14px] font-semibold hover:bg-gray-800 transition">Отправить</button>
                                    </div>
                                </div>
                            </td>
                            <td class="p-5 align-top"><span class="px-3 py-1.5 rounded-lg text-[12px] font-semibold ${statusColor}">${t.status}</span></td>
                            <td class="p-5 align-top">
                                <select onchange="updateStatus('${t.ticket_number}', this.value)" class="bg-white border border-gray-200 rounded-xl p-2.5 text-[13px] font-medium outline-none focus:border-black w-full text-black transition-colors cursor-pointer appearance-none">
                                    <option value="" disabled selected>Изменить...</option>
                                    <option value="Новое" ${t.status === 'Новое' ? 'selected' : ''}>Новое</option>
                                    <option value="В работе" ${t.status === 'В работе' ? 'selected' : ''}>В работу</option>
                                    <option value="Закрыто" ${t.status === 'Закрыто' ? 'selected' : ''}>Закрыть</option>
                                </select>
                            </td>
                        </tr>
                    `;
                });

                for (let id in savedInputs) {
                    let input = document.getElementById(id);
                    if (input) input.value = savedInputs[id];
                }
            } catch (e) { console.log("Ошибка обновления панели"); }
        }

        async function updateStatus(num, status) {
            await fetch(`${API_URL}/admin/tickets/${num}/status`, {
                method: 'PATCH', headers: { 'admin-key': currentKey, 'Content-Type': 'application/json' },
                body: JSON.stringify({ status })
            });
            loadTickets();
        }

        async function sendReply(num) {
            const input = document.getElementById(`reply-input-${num}`);
            const fileInput = document.getElementById(`reply-file-${num}`);
            
            if (!input.value.trim() && (!fileInput.files || fileInput.files.length === 0)) return;

            const formData = new FormData();
            formData.append('message', input.value);
            if (fileInput.files[0]) formData.append('file', fileInput.files[0]);

            const textToClear = input.value;
            input.value = "";
            fileInput.value = "";

            try {
                const res = await fetch(`${API_URL}/admin/tickets/${num}/message`, {
                    method: 'POST', headers: { 'admin-key': currentKey }, body: formData
                });
                if(!res.ok) {
                    alert("Ошибка отправки. Возможно, файл не поддерживается или превышен лимит.");
                    input.value = textToClear;
                }
                loadTickets();
            } catch (e) {
                input.value = textToClear;
                alert("Ошибка соединения");
            }
        }

        async function deleteMsg(id) {
            if(!confirm("Удалить сообщение?")) return;
            await fetch(`${API_URL}/admin/messages/${id}`, { method: 'DELETE', headers: { 'admin-key': currentKey } });
            loadTickets();
        }

        function logout() { location.reload(); }

        // Обновление списка обращений офицера раз в 4 секунды
        setInterval(() => {
            if(currentKey && !document.getElementById('dashboard-screen').classList.contains('hidden')) {
                loadTickets();
            }
        }, 4000);
    </script>
</body>
</html>
